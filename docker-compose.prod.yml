version: '3.8'

# Production docker-compose — uses pre-built images from Amazon ECR.
# On EC2, set ECR_REGISTRY in a .env file or shell environment.
# Example: ECR_REGISTRY=123456789012.dkr.ecr.us-east-1.amazonaws.com

services:
  proxy:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - portfolio-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/rootresume/frontend:latest
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY}
    volumes:
      - visitor-data:/app/.data
    networks:
      - portfolio-net
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/rootresume/backend:latest
    environment:
      HOST: '0.0.0.0'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - portfolio-net
    restart: unless-stopped

  almorz-web:
    image: ${ECR_REGISTRY}/almorz/web:latest
    profiles: ["almorz"]
    restart: unless-stopped
    networks:
      - portfolio-net

  almorz-api:
    image: ${ECR_REGISTRY}/almorz/api:latest
    profiles: ["almorz"]
    restart: unless-stopped
    command: npx json-server /srv/almorz/db.json --port 3001 --host 0.0.0.0
    volumes:
      - /srv/almorz:/srv/almorz   # directorio completo para evitar inode lock en rename()
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge

volumes:
  visitor-data:
