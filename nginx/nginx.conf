worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # This block defines the backend service from docker-compose
    upstream backend {
        server backend:3001;
    }

    # This block defines the frontend service from docker-compose
    upstream frontend {
        server frontend:3000;
    }

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name luna-lancuba.dev www.luna-lancuba.dev;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name luna-lancuba.dev www.luna-lancuba.dev;

        ssl_certificate     /etc/letsencrypt/live/luna-lancuba.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/luna-lancuba.dev/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Next.js-only API routes → frontend (must come before the general /api/ block)
        location /api/visitors {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/contact {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other /api/* → backend Express (strips /api prefix)
        location /api/ {
            # The rewrite rule removes the /api prefix before proxying
            rewrite /api/(.*) /$1 break;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Route all other calls to the frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
